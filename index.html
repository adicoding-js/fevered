<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FEVERED</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="page-wrap">

    <div id="captcha-card">

      <div id="top-bar">
        <div id="checkbox-area">
          <div id="main-checkbox" onclick="handleMainCheck()">
            <div id="checkmark" style="display:none;">&#10003;</div>
            <div id="spinner" style="display:none;" class="spinner"></div>
          </div>
          <span id="not-robot-label">I'm not a robot</span>
        </div>
        <div id="recaptcha-logo-area">
          <svg id="recaptcha-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="38">
            <path fill="#4a90d9" d="M32 4 L58 18 L58 46 L32 60 L6 46 L6 18 Z"/>
            <path fill="#fff" d="M32 14 L50 24 L50 44 L32 54 L14 44 L14 24 Z"/>
            <path fill="#4a90d9" d="M32 22 L44 29 L44 43 L32 50 L20 43 L20 29 Z"/>
            <path fill="#fff" d="M28 32 L30 36 L38 28" stroke="#fff" stroke-width="2" fill="none"/>
          </svg>
          <div id="logo-text">
            <span id="logo-main">reCAPTCHA</span>
            <span id="logo-sub">Privacy - Terms</span>
          </div>
        </div>
      </div>

      <div id="puzzle-area">
        <p id="puzzle-placeholder" style="color:#888; font-size:13px; text-align:center; padding:20px 0;">
          Loading level...
        </p>
      </div>

      <div id="bottom-bar">
        <div id="google-branding">
          <svg width="44" height="15" viewBox="0 0 44 15" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="13" font-family="Roboto, sans-serif" font-size="13" font-weight="700">
              <tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan>
            </text>
          </svg>
          <span id="privacy-link">Privacy</span>
          <span id="terms-sep">-</span>
          <span id="terms-link">Terms</span>
        </div>
        <div id="level-counter">[<span id="level-num">01</span> / 50]</div>
      </div>

      <div id="verify-wrap">
        <button id="verify-btn" disabled onclick="handleVerify()">Verify</button>
        <button id="audio-btn" onclick="toggleAudio()" title="Toggle audio">&#128266;</button>
      </div>

    </div>

  </div>

  <script src="game.js"></script>

</body>
</html>
